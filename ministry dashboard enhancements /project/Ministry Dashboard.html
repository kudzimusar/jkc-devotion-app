function rgb(h) { return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`; }

// ── MICRO ────────────────────────────────────────────────
const GR = { fontFamily:"'Space Grotesk',sans-serif" };

function Lbl({ children, color, style }) {
  return <div style={{fontFamily:'Inter',fontSize:10,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:color||'inherit',...style}}>{children}</div>;
}

function Spark({ data, color, w=90, h=26 }) {
  const mx=Math.max(...data),mn=Math.min(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*(h-4)-2}`).join(' ');
  return <svg width={w} height={h} style={{display:'block'}}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/></svg>;
}

function Waveform({ color }) {
  const bars=[10,22,14,38,20,46,30,52,24,42,18,48,28,44,16,50,26,40,12,34];
  return <svg width="180" height="56"><>{bars.map((h,i)=><rect key={i} x={i*9+1} y={(56-h)/2} width="6" height={h} rx="2.5" fill={color} opacity={.2+(i%3)*0.06}/>)}</></svg>;
}

function CircleScore({ score, color }) {
  const R=36,C=2*Math.PI*R;
  return <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
    <div style={{position:'relative',width:92,height:92}}>
      <svg width="92" height="92" style={{transform:'rotate(-90deg)'}}>
        <circle cx="46" cy="46" r={R} fill="none" stroke="rgba(128,128,128,0.15)" strokeWidth="5"/>
        <circle cx="46" cy="46" r={R} fill="none" stroke={color} strokeWidth="5"
          strokeDasharray={C} strokeDashoffset={C*(1-score/100)} strokeLinecap="round"
          style={{filter:`drop-shadow(0 0 5px ${color}88)`}}/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <span style={{...GR,fontSize:22,fontWeight:700,lineHeight:1}}>{score}</span>
        <span style={{fontSize:9,opacity:.5}}>/100</span>
      </div>
    </div>
    <span style={{fontSize:9,letterSpacing:'0.1em',fontWeight:600,textTransform:'uppercase',opacity:.45,textAlign:'center',lineHeight:1.4}}>SPIRITUAL<br/>ATMOSPHERE</span>
  </div>;
}

function StatTile({ label, value, note, accent, alert, spark, T }) {
  return <div style={{
    background: alert ? T.alertBg : T.bgCard,
    border:`1px solid ${alert ? T.alertBorder : T.border}`,
    borderRadius:12, padding:'16px 16px 14px',
  }}>
    <Lbl color={T.lbl} style={{marginBottom:10}}>{label}</Lbl>
    <div style={{...GR,fontSize:26,fontWeight:700,color:accent||(alert?'#F87171':T.t1),lineHeight:1}}>{value}</div>
    {spark && <div style={{marginTop:8}}><Spark data={spark} color={accent||'#8B5CF6'}/></div>}
    {note && <div style={{fontSize:11,color:alert?'#F87171':spark?'#10B981':T.t3,marginTop:6}}>{note}</div>}
  </div>;
}

}

function SideOp({ op, color, T }) {
  const [hov,setHov]=useState(false);
  return <div
    onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
    style={{
      display:'flex',alignItems:'center',gap:10,padding:'9px 10px',borderRadius:10,
      background: hov ? `rgba(${rgb(color)},0.12)` : 'transparent',
      border:`1px solid ${hov?`rgba(${rgb(color)},0.25)`:'transparent'}`,
      cursor:'pointer',marginBottom:2,transition:'all 0.15s',
    }}>
    <div style={{
      width:30,height:30,borderRadius:8,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
      background: hov ? `rgba(${rgb(color)},0.2)` : T.bgTag,
      border:`1px solid ${hov?`rgba(${rgb(color)},0.3)`:T.border}`,
      ...GR,fontSize:12,fontWeight:700,color:hov?color:T.t3,transition:'all 0.15s',
    }}>{op.sym}</div>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:13,fontWeight:500,color:T.t1,lineHeight:1.2}}>{op.label}</div>
      <div style={{fontSize:11,color:T.t3,marginTop:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{op.sub}</div>
    </div>
    <span style={{fontSize:12,color:T.t3,opacity:hov?1:0,transition:'opacity 0.15s'}}>→</span>
  </div>;
}

// ── MINISTRY HUB ──────────────────────────────────────────
function MinistryHub({ onSelect, T }) {
  const [hov,setHov]=useState(null);
  return <div style={{overflowY:'auto',flex:1}}>
    <div style={{padding:'48px 40px 28px'}}>
      <Lbl color={T.lbl} style={{marginBottom:10}}>Ministry Intelligence Layer · Tue Apr 22, 2026</Lbl>

    </div>
    <div style={{padding:'0 40px 64px',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:14}}>
      {MINISTRIES.map(m=>{
        const isH=hov===m.id;
        return <div key={m.id}
          onMouseEnter={()=>setHov(m.id)} onMouseLeave={()=>setHov(null)}

            boxShadow:isH?`0 10px 40px rgba(${rgb(m.color)},0.12)`:'none',

          <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${m.color},${m.g2})`,borderRadius:'18px 18px 0 0'}}/>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
            <div>
              <Lbl color={m.color} style={{marginBottom:6}}>{m.tag}</Lbl>
              <div style={{...GR,fontSize:16,fontWeight:600,color:T.t1,lineHeight:1.25}}>{m.name}</div>
            </div>
            <div style={{background:`rgba(${rgb(m.color)},0.15)`,border:`1px solid rgba(${rgb(m.color)},0.3)`,borderRadius:6,padding:'3px 9px',fontSize:9,fontWeight:700,color:m.color,letterSpacing:'0.1em',flexShrink:0,marginTop:2}}>LEADER</div>

            </div>)}

        </div>;
      })}

  </div>;
}

          </div>
        </div>
        {tweaks.showAI && (
          <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:14,padding:'18px 20px',display:'flex',flexDirection:'column',gap:0}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:14}}>
              <span style={{color:'#8B5CF6',fontSize:11}}>✦</span>
              <Lbl color={T.lbl}>AI Insights</Lbl>
            </div>
            {[
              ['#8B5CF6','Attendance grew 18% over 8 weeks. Submit a report to lock in this data for leadership review.'],
              ['#F87171','No report in 40 days. Health score capped at 72. Filing a report is your highest-leverage action.'],
              ['#F59E0B','Gear Health Log has zero entries. Equipment EOL risk is untracked — audit before next rehearsal.'],
              ['#10B981','Vocalist Rotation form inactive. Irregular rotation may impact sound consistency over time.'],
            ].map(([c,txt],i,arr)=>(
              <div key={i} style={{display:'flex',gap:10,padding:'10px 0',borderBottom:i<arr.length-1?`1px solid ${T.borderMid}`:'none'}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:c,flexShrink:0,marginTop:4,boxShadow:`0 0 5px ${c}`}}/>
                <p style={{fontSize:12,color:T.t2,lineHeight:1.6}}>{txt}</p>
              </div>
            ))}
            <div style={{marginTop:'auto',paddingTop:12,borderTop:`1px solid ${T.borderMid}`}}>
              <div style={{fontSize:10,color:T.t3,letterSpacing:'0.06em',textTransform:'uppercase'}}>Church OS Intelligence</div>
            </div>
          </div>
        )}
      </div>
    </section>

    {/* ② HERO */}
    <section style={{
      background: T.d
        ? 'linear-gradient(135deg,rgba(139,92,246,0.22) 0%,rgba(109,40,217,0.1) 45%,transparent 100%)'
        : 'linear-gradient(135deg,rgba(139,92,246,0.1) 0%,rgba(139,92,246,0.04) 55%,transparent 100%)',
      border:`1px solid rgba(139,92,246,${T.d?0.28:0.2})`,
      borderRadius:20,padding:'32px 36px',position:'relative',overflow:'hidden',
    }}>
      <div style={{position:'absolute',top:-50,right:-30,width:280,height:280,background:'radial-gradient(circle,rgba(139,92,246,0.15),transparent 70%)',pointerEvents:'none'}}/>
      <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',gap:20,flexWrap:'wrap',position:'relative'}}>
        <div style={{flex:1,minWidth:280}}>
          <Lbl color="#8B5CF6" style={{marginBottom:10}}>SOULFUL & TECH · WORSHIP MINISTRY</Lbl>
          <h2 style={{...GR,fontSize:48,fontWeight:700,color:T.t1,letterSpacing:'-0.025em',lineHeight:1.0,marginBottom:10}}>Worship Ministry</h2>
          <p style={{color:T.t2,fontSize:14,lineHeight:1.65,maxWidth:420}}>
            Leading the congregation into God's presence through music and arts. Saturday evening rehearsals.
            Director: <strong style={{color:T.d?'#c4b5fd':'#7C3AED',fontWeight:500}}>Eri Kudo</strong>
          </p>
          <div style={{display:'flex',gap:8,marginTop:18,flexWrap:'wrap'}}>
            {[['NEXT REHEARSAL','Sat, Apr 26'],['LAST REPORT','40d ago'],['TEAM','18 members'],['SETLISTS','6 this mo.']].map(([l,v])=>(
              <div key={l} style={{background:T.d?'rgba(0,0,0,0.3)':T.bgCard,borderRadius:10,padding:'10px 14px',border:`1px solid ${T.border}`}}>
                <Lbl color={T.lbl} style={{marginBottom:4}}>{l}</Lbl>
                <div style={{...GR,fontSize:13,fontWeight:600,color:T.t1}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,flexShrink:0}}>
          <CircleScore score={72} color="#8B5CF6"/>
          <div style={{opacity:.5}}><Waveform color="#8B5CF6"/></div>
        </div>
      </div>
    </section>

    {/* ③ AUTOMATION STATUS */}
    <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:12,padding:'14px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{position:'relative',width:10,height:10,flexShrink:0}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:'#10B981'}}/>
          <div style={{position:'absolute',inset:-3,borderRadius:'50%',background:'rgba(16,185,129,0.3)',animation:'pulse 2s infinite'}}/>
        </div>
        <div>
          <div style={{fontSize:13,fontWeight:500,color:T.t1}}>Automation Active</div>
          <div style={{fontSize:11,color:T.t3}}>Real-time health score & Mission Control sync enabled</div>
        </div>
      </div>
      <div style={{background:T.bgTag,border:`1px solid ${T.border}`,borderRadius:8,padding:'6px 14px',fontSize:11,color:T.t2}}>Last sync: 3/12/2026</div>
    </div>

    {/* ④ COMMUNICATIONS — standalone internal comms */}
    <section>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <div>
          <Lbl color={T.lbl} style={{marginBottom:4}}>Internal Communications</Lbl>
          <p style={{fontSize:12,color:T.t3}}>Broadcast messages, team alerts & ministry-wide announcements</p>
        </div>
        <button style={{background:`rgba(${rgb(m.color)},0.16)`,border:`1px solid rgba(${rgb(m.color)},0.35)`,borderRadius:9,color:m.color,padding:'8px 18px',fontSize:12,fontWeight:700,letterSpacing:'0.05em'}}>
          + NEW MESSAGE ▾
        </button>
      </div>
      <div style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:16,overflow:'hidden'}}>
        <div style={{padding:'14px 18px',display:'flex',gap:6,flexWrap:'wrap',borderBottom:`1px solid ${T.borderMid}`}}>
          {COMMS_TABS.map(t=>(
            <button key={t} onClick={()=>setCommsTab(t)} style={{
              background:commsTab===t?`rgba(${rgb(m.color)},0.16)`:'transparent',
              border:`1px solid ${commsTab===t?`rgba(${rgb(m.color)},0.35)`:T.border}`,
              borderRadius:7,color:commsTab===t?m.color:T.t3,
              padding:'5px 13px',fontSize:10,fontWeight:700,letterSpacing:'0.07em',
            }}>{t}</button>
          ))}
        </div>
        <div style={{padding:'48px 20px',textAlign:'center',color:T.t3,fontSize:13}}>
          No {commsTab.toLowerCase()} messages found
        </div>
      </div>
    </section>

  </div>;
}

// ── TWEAKS ────────────────────────────────────────────────
function TweaksPanel({ tweaks, setTweaks, theme, setTheme, T }) {
  const set = (k,v) => {
    setTweaks(p => { const n={...p,[k]:v}; window.parent.postMessage({type:'__edit_mode_set_keys',edits:{[k]:v}},'*'); return n; });
  };
  return <div style={{
    position:'fixed',bottom:24,right:24,background:T.d?'#0b0f24':'#ffffff',
    border:`1px solid ${T.border}`,borderRadius:16,padding:22,width:240,
    zIndex:200,boxShadow:T.d?'0 24px 64px rgba(0,0,0,0.6)':'0 12px 48px rgba(0,0,0,0.12)',
  }}>
    <div style={{...GR,fontSize:13,fontWeight:600,color:T.t1,marginBottom:18}}>Tweaks</div>
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <TRow label="Theme" T={T}>
        <div style={{display:'flex',gap:4}}>
          {['dark','light'].map(th=>(
            <button key={th} onClick={()=>setTheme(th)} style={{
              background:theme===th?'rgba(139,92,246,0.22)':T.bgTag,
              border:`1px solid ${theme===th?'rgba(139,92,246,0.45)':T.border}`,
              borderRadius:6,color:theme===th?'#a78bfa':T.t3,
              padding:'4px 10px',fontSize:10,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',
            }}>{th}</button>
          ))}
        </div>
      </TRow>
      <TRow label="Density" T={T}>
        <div style={{display:'flex',gap:4}}>
          {['comfortable','compact'].map(d=>(
            <button key={d} onClick={()=>set('density',d)} style={{
              background:tweaks.density===d?'rgba(139,92,246,0.22)':T.bgTag,
              border:`1px solid ${tweaks.density===d?'rgba(139,92,246,0.45)':T.border}`,
              borderRadius:6,color:tweaks.density===d?'#a78bfa':T.t3,
              padding:'4px 8px',fontSize:9,fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',
            }}>{d}</button>
          ))}
        </div>
      </TRow>
      <TRow label="AI Insights" T={T}><Toggle v={tweaks.showAI} on={()=>set('showAI',!tweaks.showAI)}/></TRow>
    </div>
  </div>;
}

function TRow({ label, children, T }) {
  return <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
    <span style={{fontSize:12,color:T.t2,flexShrink:0}}>{label}</span>
    {children}
  </div>;
}

function Toggle({ v, on }) {
  return <div onClick={on} style={{width:36,height:20,borderRadius:10,background:v?'#8B5CF6':'rgba(128,128,128,0.2)',position:'relative',cursor:'pointer',flexShrink:0}}>
    <div style={{position:'absolute',top:3,left:v?18:3,width:14,height:14,borderRadius:'50%',background:'#fff',boxShadow:'0 1px 3px rgba(0,0,0,0.3)',transition:'left 0.18s'}}/>
  </div>;
}

// ── APP ───────────────────────────────────────────────────
function App() {
  const [view, setView]         = useState(()=>localStorage.getItem('cos_view')||'hub');
  const [sidebarOpen, setSidebar]= useState(()=>localStorage.getItem('cos_sidebar')!=='false');
  const [tweaksOpen, setTweaksOpen]= useState(false);
  const [tweaks, setTweaks]     = useState(TWEAK_DEFAULTS);
  const [theme, setThemeRaw]    = useState(()=>localStorage.getItem('cos_theme')||'dark');

  const T = mk(theme);

  const setTheme = v => { setThemeRaw(v); localStorage.setItem('cos_theme',v); };
  const toggleSidebar = () => setSidebar(o=>{ localStorage.setItem('cos_sidebar',!o); return !o; });

  useEffect(()=>{ localStorage.setItem('cos_view',view); }, [view]);
  useEffect(()=>{
    document.body.style.background = T.bg;
    document.body.style.color = T.t1;
  }, [theme]);
  useEffect(()=>{
    const h = e => {
      if(e.data?.type==='__activate_edit_mode')   setTweaksOpen(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',h);
  },[]);

  return <div style={{minHeight:'100vh',background:T.bg,color:T.t1,display:'flex',flexDirection:'column'}}>
    <TopNav
      view={view} onBack={()=>setView('hub')}
      sidebarOpen={sidebarOpen} toggleSidebar={toggleSidebar}
      theme={theme} setTheme={setTheme} T={T}
    />
    <div style={{display:'flex',flex:1,overflow:'hidden',height:'calc(100vh - 56px)'}}>
      {view==='worship' && <LeftSidebar open={sidebarOpen} color="#8B5CF6" T={T}/>}
      {view==='hub'
        ? <MinistryHub onSelect={()=>setView('worship')} T={T}/>
        : <WorshipDashboard tweaks={tweaks} T={T}/>
      }
    </div>
    {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} theme={theme} setTheme={setTheme} T={T}/>}
    <style>{`@keyframes pulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.7);opacity:0}}`}</style>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
